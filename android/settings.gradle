rootProject.name = 'fetchy_sdk_flutter'

def localSdkProjectDir = new File(settingsDir, '../../fetchy_sdk/fetchy-sdk')
def importedSdkProjectDir = new File(settingsDir, 'third_party/fetchy-android/fetchy-sdk')
def embeddedSdkProjectDir = localSdkProjectDir.exists() ? localSdkProjectDir : (importedSdkProjectDir.exists() ? importedSdkProjectDir : null)

if (embeddedSdkProjectDir != null) {
	include ':fetchy-sdk'
	project(':fetchy-sdk').projectDir = embeddedSdkProjectDir
}
